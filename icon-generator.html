<!DOCTYPE html>
<html>
<head><title>PawLog Icon Generator</title></head>
<body>
<canvas id="icon" width="1024" height="1024"></canvas>
<script>
const canvas = document.getElementById('icon');
const ctx = canvas.getContext('2d');
const size = 1024;

// Orange gradient background
const grad = ctx.createLinearGradient(0, 0, size, size);
grad.addColorStop(0, '#FF8C42');
grad.addColorStop(1, '#FF6B35');
ctx.fillStyle = grad;

// Rounded rectangle
const r = 180;
ctx.beginPath();
ctx.moveTo(r, 0);
ctx.lineTo(size - r, 0);
ctx.quadraticCurveTo(size, 0, size, r);
ctx.lineTo(size, size - r);
ctx.quadraticCurveTo(size, size, size - r, size);
ctx.lineTo(r, size);
ctx.quadraticCurveTo(0, size, 0, size - r);
ctx.lineTo(0, r);
ctx.quadraticCurveTo(0, 0, r, 0);
ctx.closePath();
ctx.fill();

// Paw pads (white)
ctx.fillStyle = 'white';

// Main pad (bottom, large oval with heart shape)
ctx.beginPath();
ctx.ellipse(512, 620, 160, 130, 0, 0, Math.PI * 2);
ctx.fill();

// Heart cutout in main pad
ctx.fillStyle = '#FF7840';
// Left heart bump
ctx.beginPath();
ctx.arc(490, 595, 35, 0, Math.PI * 2);
ctx.fill();
// Right heart bump
ctx.beginPath();
ctx.arc(534, 595, 35, 0, Math.PI * 2);
ctx.fill();
// Heart bottom triangle
ctx.beginPath();
ctx.moveTo(455, 610);
ctx.lineTo(512, 665);
ctx.lineTo(569, 610);
ctx.fill();

// Toe pads (4 smaller circles)
ctx.fillStyle = 'white';

// Top left toe
ctx.beginPath();
ctx.ellipse(350, 420, 65, 75, -0.3, 0, Math.PI * 2);
ctx.fill();

// Inner left toe
ctx.beginPath();
ctx.ellipse(445, 370, 55, 70, -0.1, 0, Math.PI * 2);
ctx.fill();

// Inner right toe
ctx.beginPath();
ctx.ellipse(575, 370, 55, 70, 0.1, 0, Math.PI * 2);
ctx.fill();

// Top right toe
ctx.beginPath();
ctx.ellipse(670, 420, 65, 75, 0.3, 0, Math.PI * 2);
ctx.fill();

// Download link
const link = document.createElement('a');
link.download = 'pawlog-icon-1024.png';
link.href = canvas.toDataURL('image/png');
link.textContent = 'Download Icon (1024x1024)';
link.style.cssText = 'display:block;margin:20px;font-size:24px;';
document.body.appendChild(link);
</script>
</body>
</html>
