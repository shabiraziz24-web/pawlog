<!DOCTYPE html>
<html>
<head>
<title>PawLog Icon Generator</title>
<style>
    body { text-align: center; padding: 40px; font-family: -apple-system, sans-serif; background: #f5f5f5; }
    canvas { border: 1px solid #ccc; border-radius: 20px; margin: 20px; }
    a { display: inline-block; margin: 20px; padding: 15px 30px; background: #FF6B35; color: white; text-decoration: none; border-radius: 10px; font-size: 18px; font-weight: bold; }
    a:hover { background: #FF8C42; }
    h1 { color: #333; }
    p { color: #666; }
</style>
</head>
<body>
<h1>🐾 PawLog App Icon (No Alpha)</h1>
<p>Right-click the image and "Save Image As" — or use the download button.</p>
<br>
<canvas id="icon" width="1024" height="1024"></canvas>
<br>
<a id="dl" href="#">⬇️ Download Icon (1024x1024 JPEG - No Alpha)</a>

<script>
const canvas = document.getElementById('icon');
const ctx = canvas.getContext('2d');
const s = 1024;

// Fill entire background solid first (no transparency)
ctx.fillStyle = '#FF6B35';
ctx.fillRect(0, 0, s, s);

// Orange gradient background
const grad = ctx.createLinearGradient(0, 0, s, s);
grad.addColorStop(0, '#FF8C42');
grad.addColorStop(1, '#FF6B35');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, s, s);

// Paw pads (white)
ctx.fillStyle = 'white';

// Main pad (bottom, large oval)
ctx.beginPath();
ctx.ellipse(512, 620, 160, 130, 0, 0, Math.PI * 2);
ctx.fill();

// Heart cutout in main pad
ctx.fillStyle = '#FF7840';
ctx.beginPath();
ctx.arc(490, 590, 38, 0, Math.PI * 2);
ctx.fill();
ctx.beginPath();
ctx.arc(534, 590, 38, 0, Math.PI * 2);
ctx.fill();
ctx.beginPath();
ctx.moveTo(452, 608);
ctx.lineTo(512, 670);
ctx.lineTo(572, 608);
ctx.fill();

// Toe pads (4 smaller circles)
ctx.fillStyle = 'white';

ctx.beginPath();
ctx.ellipse(345, 415, 68, 80, -0.3, 0, Math.PI * 2);
ctx.fill();

ctx.beginPath();
ctx.ellipse(448, 360, 58, 72, -0.1, 0, Math.PI * 2);
ctx.fill();

ctx.beginPath();
ctx.ellipse(576, 360, 58, 72, 0.1, 0, Math.PI * 2);
ctx.fill();

ctx.beginPath();
ctx.ellipse(679, 415, 68, 80, 0.3, 0, Math.PI * 2);
ctx.fill();

// Convert to JPEG (no alpha channel) then to PNG without alpha
// Create a second canvas to flatten alpha
const flat = document.createElement('canvas');
flat.width = s;
flat.height = s;
const fctx = flat.getContext('2d', { alpha: false });
fctx.drawImage(canvas, 0, 0);

// Set up download link as PNG from non-alpha canvas
const dl = document.getElementById('dl');
dl.href = flat.toDataURL('image/png');
dl.download = 'pawlog-icon-1024.png';
</script>
</body>
</html>
